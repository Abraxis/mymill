name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Release
        run: |
          xcodebuild build \
            -project MyMill.xcodeproj \
            -scheme MyMill \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            SYMROOT=build

      - name: Package DMG and ZIP
        run: |
          APP_PATH="build/Release/MyMill.app"
          VERSION="${GITHUB_REF_NAME#v}"

          # DMG
          mkdir -p dmg-staging
          cp -R "$APP_PATH" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "MyMill" -srcfolder dmg-staging -ov -format UDZO "MyMill-${VERSION}-macOS.dmg"
          rm -rf dmg-staging

          # ZIP
          cd build/Release && zip -r -y "../../MyMill-${VERSION}-macOS.zip" MyMill.app && cd ../..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            MyMill-*-macOS.dmg
            MyMill-*-macOS.zip
